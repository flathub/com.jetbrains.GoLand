name: ruby
buildsystem: autotools
no-autogen: true
config-opts:
  - --prefix=/app
sources:
  - type: archive
    url: https://cache.ruby-lang.org/pub/ruby/4.0/ruby-4.0.5.tar.gz
    sha256: 7d6149079a63f8ae1d326c9fa65c6019ba2dc3155eae7b39159817911c88958e
    x-checker-data:
      type: html
      url: "https://www.ruby-lang.org/en/downloads/"
      version-pattern: "The current stable version is ([\\d\\.-]*)"
      url-template: "https://cache.ruby-lang.org/pub/ruby/$major.$minor/ruby-$major.$minor.$patch.tar.gz"
